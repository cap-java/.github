name: Close Stale Issues

on:
  workflow_call:
    inputs:
      days-before-close:
        description: Number of days of inactivity before closing an issue.
        type: number
        required: false
        default: 14
      stale-label:
        description: Label to identify issues awaiting author response.
        type: string
        required: false
        default: 'author action'
      close-message:
        description: Message posted when an issue is auto-closed.
        type: string
        required: false
        default: 'This issue has been automatically closed due to 2 weeks of inactivity. If you believe this was a mistake, please reopen or comment to continue the discussion.'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          close-issue-message: ${{ inputs.close-message }}
          days-before-stale: -1
          days-before-issue-close: ${{ inputs.days-before-close }}
          days-before-pr-close: -1
          stale-issue-label: ${{ inputs.stale-label }}
          remove-issue-stale-when-updated: true
          labels-to-remove-when-unstale: ${{ inputs.stale-label }}
