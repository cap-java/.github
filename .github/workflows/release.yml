name: Deploy to Maven Central

on:
  workflow_call:
    inputs:
      java-version:
        description: Java version for the build.
        type: string
        required: false
        default: '17'
      maven-version:
        description: Maven version for the build.
        type: string
        required: true
      cds-dk-version:
        description: The @sap/cds-dk version to install globally.
        type: string
        required: false
        default: '9.9.1'
      blackduck-project-name:
        description: The BlackDuck project name.
        type: string
        required: true
      blackduck-included-modules:
        description: Comma-separated Maven modules to include in the BlackDuck scan.
        type: string
        required: true
      maven-build-args:
        description: Extra Maven arguments for the build step (e.g. profile exclusions).
        type: string
        required: false
        default: ''
      maven-deploy-profiles:
        description: Maven profiles to activate for deployment (comma-separated).
        type: string
        required: false
        default: 'deploy-release'
      maven-deploy-extra-args:
        description: Extra Maven arguments for the deploy step.
        type: string
        required: false
        default: ''

jobs:
  requires-approval:
    runs-on: ubuntu-latest
    name: "Waiting for release approval"
    environment: release-approval
    permissions:
      contents: read
    steps:
      - name: Approval Step
        run: echo "Release has been approved!"

  verify-version:
    needs: requires-approval
    name: Verify Version Matches Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ inputs.java-version }}
          distribution: sapmachine
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@d6af6abeda15e98926a57b5aa970a96bb37f97d1 # v5
        with:
          maven-version: ${{ inputs.maven-version }}

      - name: Verify pom.xml revision matches release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          REVISION=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)
          echo "Tag:      $TAG"
          echo "Revision: $REVISION"
          if [ "$TAG" != "$REVISION" ]; then
            echo "::error::Release tag '$TAG' does not match pom.xml <revision> '$REVISION'. Open a 'Prep release' PR to bump the version before tagging."
            exit 1
          fi
        shell: bash

  blackduck:
    needs: verify-version
    name: Blackduck Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Scan With Black Duck
        uses: cap-java/.github/actions/scan-with-blackduck@main
        with:
          blackduck_token: ${{ secrets.BLACK_DUCK_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          maven-version: ${{ inputs.maven-version }}
          project-name: ${{ inputs.blackduck-project-name }}
          included-modules: ${{ inputs.blackduck-included-modules }}
          version: ${{ github.event.release.tag_name }}

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-version
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build
        uses: cap-java/.github/actions/build@main
        with:
          java-version: ${{ inputs.java-version }}
          maven-version: ${{ inputs.maven-version }}
          cds-dk-version: ${{ inputs.cds-dk-version }}
          maven-args: ${{ inputs.maven-build-args }}

  deploy:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [blackduck, build]
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Deploy
        uses: cap-java/.github/actions/deploy-release@main
        with:
          user: ${{ secrets.CENTRAL_REPOSITORY_USER }}
          password: ${{ secrets.CENTRAL_REPOSITORY_PASS }}
          pgp-pub-key: ${{ secrets.PGP_PUBKEY_ID }}
          pgp-private-key: ${{ secrets.PGP_PRIVATE_KEY }}
          pgp-passphrase: ${{ secrets.PGP_PASSPHRASE }}
          revision: ${{ github.event.release.tag_name }}
          maven-version: ${{ inputs.maven-version }}
          cds-dk-version: ${{ inputs.cds-dk-version }}
          maven-profiles: ${{ inputs.maven-deploy-profiles }}
          maven-extra-args: ${{ inputs.maven-deploy-extra-args }}
